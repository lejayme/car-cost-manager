name: car_cost_app
description: "用车成本记录及分析软件 - 支持Windows和Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 数据存储
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # 图表
  fl_chart: ^0.66.0

  # 状态管理
  provider: ^6.1.0

  # 国际化和日期
  intl: ^0.18.0

  # 文件操作和分享
  share_plus: ^7.2.0
  file_picker: ^6.1.0

  # Excel导出支持
  excel: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
