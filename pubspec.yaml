name: car_cost_manager
description: "🚗 用车成本管理软件 - 跨平台（Android + Windows）个人用车成本记录与分析工具"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # 数据库
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  
  # 图表
  fl_chart: ^0.66.0
  
  # 工具
  intl: ^0.18.1
  uuid: ^4.3.3
  image_picker: ^1.0.7
  
  # UI
  google_fonts: ^6.1.0
  flutter_slidable: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
